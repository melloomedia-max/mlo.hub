<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Agency Hub - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/mobile.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    body {
      background: radial-gradient(circle at 50% -20%, #201a35, var(--bg-color));
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: var(--font-family, 'Inter', sans-serif);
      color: white;
    }
    
    .login-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .brand-header h1 {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-weight: 700;
      font-size: 26px;
      margin: 0;
    }
    .brand-header span {
      font-style: italic;
      color: #a5b4fc;
    }

    input[type="password"] {
      width: 100%;
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
      box-sizing: border-box;
      text-align: center;
      letter-spacing: 4px;
      transition: all 0.3s ease;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }
    
    .error-msg {
      color: #f43f5e;
      font-size: 14px;
      margin-top: 15px;
      height: 20px;
    }
  </style>
</head>
<body>


  <div class="login-container">
    <div class="brand-header">
      <lottie-player src="/img/Siri.json" background="transparent" speed="1" style="width: 50px; height: 50px;" loop autoplay></lottie-player>
      <h1><span style="background: var(--melloo-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">melloo</span> Agency Hub</h1>
    </div>
    
    <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em;">Staff Authentication</p>
    
    <form action="/login" method="POST">
      <div style="margin-bottom: 16px; text-align: left;">
        <label for="email" style="display: block; font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; margin-left: 4px;">Email Address</label>
        <input type="email" name="email" id="email" placeholder="name@melloo.media" autocomplete="email" required
               style="width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; font-family: inherit;">
      </div>

      <div style="margin-bottom: 24px; text-align: left;">
        <label for="password" style="display: block; font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; margin-left: 4px;">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password"
               style="width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; letter-spacing: 2px; font-family: inherit;">
      </div>

      <button type="submit" style="width: 100%; padding: 14px; background: var(--melloo-gradient); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 59, 59, 0.3);">
        Access Hub
      </button>
      <div id="error-msg" class="error-msg" style="margin-top: 20px; color: var(--rose); font-size: 13px; font-weight: 600;"></div>
    </form>

    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--glass-border);">
        <a href="https://melloo.media" style="color: var(--text-tertiary); text-decoration: none; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-tertiary)'">
            ← Back to Website
        </a>
    </div>
  </div>

  <script>
      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get('error');
      const errorEl = document.getElementById('error-msg');
      
      if (error === 'invalid') {
          errorEl.textContent = 'Invalid password';
      } else if (error === 'notconfigured') {
          errorEl.textContent = 'Server password not configured';
      } else if (error === 'session') {
          errorEl.textContent = 'Session could not be established';
      } else if (error) {
          errorEl.textContent = 'Login error';
      }
      
      // clear any legacy localStorage token
      localStorage.removeItem('agency_admin_token');
  </script>



  </body>
</html>
